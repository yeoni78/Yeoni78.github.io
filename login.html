<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Golden Hotel Resort</title>
    
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css"> </head>
<body>

    <header id="main-header" class="scrolled">
        <div class="logo">
            <a href="index.html"><h2>Golden Hotel</h2></a>
        </div>
        <nav>
            <ul>
                <li><a href="login.html">로그인</a></li>
                <li><a href="find-room.html">호실 찾기</a></li>
                <li><a href="my-room.html">내 호실</a></li>
                <li><a href="rules.html">호텔 이용 수칙</a></li>
            </ul>
        </nav>
    </header>

    <main class="login-main">
        <div class="login-container">
            <h2 class="page-title">로그인</h2>

            <div class="login-tabs">
                <button class="tab-btn active" data-target="login-form">로그인</button>
                <button class="tab-btn" data-target="logout-form">로그아웃</button>
            </div>

            <div id="login-form" class="tab-content active">
                <div class="input-group">
                    <input type="text" placeholder="아이디 입력" required>
                </div>
                <p class="helper-text">· 로그인 시, 아이디를 입력해주세요.</p>
                
                <div class="input-group">
                    <input type="password" placeholder="비밀번호 입력" required>
                </div>
                
                <div class="check-group">
                    <input type="checkbox" id="save-id">
                    <label for="save-id">아이디 저장</label>
                </div>
                
                <button type="submit" class="submit-btn">로그인</button>
            </div>

            <div id="logout-form" class="tab-content">
                <p class="logout-message">현재 로그인되어 있습니다.</p>
                <button type="button" class="submit-btn">로그아웃</button>
            </div>
        </div>
    </main> 

    <footer>
        <div class="footer-content">
            <h2>Golden Hotel Resort</h2>
            <p>호텔 테마 반응형 웹사이트 프로젝트</p>
            <p>Copyright © 2026 Golden Hotel. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/login.js"></script> </body>
</html>
