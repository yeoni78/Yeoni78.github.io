<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전지적 독자 시점 - Main</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
       <div class="header-left">
            <img src="image/logo_main.svg" alt="ORV Composite Logo" class="header-logo-composite">
        </div>
        
        <nav class="header-nav">
            <ul>
                <li><a href="#">UNIVERSE</a></li>
                <li><a href="#">CHARACTER</a></li>
                <li><a href="#">STARSTREAM</a></li>
                <li><a href="#">SCENARIO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
        <section class="section-hero">
    <div class="hero-slider-track">
        <img src="image/hero_01.png" alt="Slide 1" class="hero-slide">
        <img src="image/hero_02.png" alt="Slide 2" class="hero-slide">
        <img src="image/hero_03.png" alt="Slide 3" class="hero-slide">
        <img src="image/hero_01.png" alt="Slide 1 Copy" class="hero-slide">
    </div>

    <div class="slider-controls">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </div>
</section>

        <div class="intro-quote">
            <p>'이것은 독자(讀者)의 설화<br>동시에 독자(獨子)의 설화'</p>
        </div>

        <section class="section-collage">
            

            <div class="collage-layout">
                
                <div class="collage-left">
                    <img src="image/2_2.png" alt="김독자" class="item-tall">
                    <img src="image/2_1.png" alt="문양 1" class="item-square">
                    <img src="image/starstream.png" alt="문양 2" class="item-square">
                </div>

                <div class="collage-right">
    <div class="right-quote-group">
    <img src="image/line_deco.png" alt="" class="item-quote-line">
    
    <p class="quote-text">[오직 나만이, 이 세계의 결말을 알고 있다.]</p>
</div>
    
    <img src="image/2_3.png" alt="마주보는 두 사람" class="item-landscape">
    <img src="image/2_4.png" alt="빛나는 구슬" class="item-square-small">
</div>

            </div>

            <div class="collage-bottom-text">
                <p>무려 3149편에 달하는 장편 판타지 소설.</p>
                <p>'멸망한 세계에서 살아남는 세 가지 방법'이 현실이 되어버렸다.</p>
                <p>그리고 그 작품을 완독한 이는 단 한 명뿐이었다.</p>
            </div>
        </section>
    
        <section class="section-worldview">
    <div class="worldview-container">
        <div class="world-title">
            <img src="image/4_1.png" alt="세계관 소개" class="img-title">
        </div>

        <div class="world-deco">
            <img src="image/4_2.png" alt="장식 문양" class="img-deco">
        </div>

        <div class="world-main-card">
            <button class="btn-prev">〈</button>
            <img src="image/4_3.png" alt="전지적 독자 시점 단행본" class="img-main">
            <button class="btn-next">〉</button>
        </div>

        <div class="world-link">
            <a href="#">
                <img src="image/4_4.png" alt="세계관 보러가기" class="img-link">
            </a>
        </div>
    </div>
</section>

    </main>
    <footer class="main-footer">
        <img src="image/footer_bg.png" alt="ORV Footer" class="footer-logo">
    </footer>

</body>
</html>
